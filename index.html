<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div id="login-gate" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-teal-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fa-solid fa-tooth text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-900">Clinic Sign In</h2>
            </div>
            <form onsubmit="handleCustomerLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Username</label>
                    <input type="text" id="cust-username" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-slate-900 focus:outline-none focus:border-teal-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Password</label>
                    <input type="password" id="cust-password" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-slate-900 focus:outline-none focus:border-teal-500">
                </div>
                <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg shadow-md transition mt-2">
                    Access System
                </button>
            </form>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <nav class="bg-teal-700 text-white shadow-md px-6 py-4 flex justify-between items-center">
            <div class="font-bold text-xl flex items-center gap-2">
                <i class="fa-solid fa-tooth"></i> <span id="nav-clinic-name">Clinic Portal</span>
            </div>
            <button onclick="handleLogout()" class="bg-teal-800 hover:bg-teal-900 px-4 py-2 rounded-lg text-sm font-semibold transition">
                <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </button>
        </nav>

        <div class="max-w-6xl mx-auto p-6 md:p-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 h-fit">
                <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">Log New Patient</h3>
                <form onsubmit="addPatient(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Patient Name</label>
                        <input type="text" id="patient-name" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Phone Number</label>
                        <input type="text" id="patient-phone" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Treatment Notes</label>
                        <input type="text" id="patient-treatment" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Price / Cost</label>
                        <input type="number" id="patient-price" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2">
                    </div>
                    <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded-lg transition">
                        Save Record
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <h3 class="text-lg font-bold text-slate-800 mb-4 border-b pb-2">Patient Records</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-xs font-bold text-slate-500 uppercase border-b">
                                <th class="pb-3">Name & Phone</th>
                                <th class="pb-3">Treatment</th>
                                <th class="pb-3">Cost</th>
                                <th class="pb-3 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="patients-table-body" class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
